<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fadeGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8A5A1A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8A5A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A5A1A;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background: white -->
  <rect width="480" height="120" fill="#FAFAF8" rx="4"/>

  <!-- Ornamental rule -->
  <line x1="32" y1="22" x2="200" y2="22" stroke="#C9923A" stroke-width="0.5" opacity="0.5"/>
  <circle cx="206" cy="22" r="1.5" fill="#C9923A" opacity="0.7"/>
  <line x1="212" y1="22" x2="220" y2="22" stroke="#C9923A" stroke-width="0.5" opacity="0.5"/>

  <!-- "Almost" — rich dark amber -->
  <text x="32" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-style="italic"
    font-weight="700"
    fill="#8A5A1A"
    letter-spacing="-1">Almost</text>

  <!-- "Became" — fades out -->
  <text x="222" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-style="italic"
    font-weight="700"
    fill="url(#fadeGradLight)"
    letter-spacing="-1">Became</text>

  <!-- Dissolving particles -->
  <circle cx="445" cy="58" r="2.5" fill="#8A5A1A" opacity="0.2"/>
  <circle cx="453" cy="52" r="1.8" fill="#8A5A1A" opacity="0.12"/>
  <circle cx="449" cy="65" r="1.4" fill="#8A5A1A" opacity="0.10"/>
  <circle cx="460" cy="60" r="1.0" fill="#8A5A1A" opacity="0.07"/>
  <circle cx="456" cy="70" r="0.8" fill="#8A5A1A" opacity="0.05"/>

  <!-- Tagline -->
  <text x="32" y="96"
    font-family="Georgia, serif"
    font-size="11"
    fill="#9A8E80"
    letter-spacing="4">A MUSEUM OF ABANDONED SELVES</text>

  <!-- Rule -->
  <line x1="32" y1="106" x2="160" y2="106" stroke="#E0D8CC" stroke-width="0.5"/>
</svg>
