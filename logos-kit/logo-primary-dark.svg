<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9923A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C9923A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9923A;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="fadeGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8DCC8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E8DCC8;stop-opacity:0.3" />
    </linearGradient>
    <!-- Particle dots that appear to dissolve off "Became" -->
    <radialGradient id="dot1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9923A;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#C9923A;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" fill="#0A0906" rx="4"/>

  <!-- Thin ornamental rule above -->
  <line x1="32" y1="22" x2="200" y2="22" stroke="#8A6128" stroke-width="0.5" opacity="0.6"/>
  <circle cx="206" cy="22" r="1.5" fill="#8A6128" opacity="0.8"/>
  <line x1="212" y1="22" x2="220" y2="22" stroke="#8A6128" stroke-width="0.5" opacity="0.6"/>

  <!-- "Almost" — solid, commanding amber -->
  <text x="32" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-style="italic"
    font-weight="700"
    fill="#C9923A"
    letter-spacing="-1">Almost</text>

  <!-- "Became" — fades to near-invisible, Zeigarnik effect -->
  <text x="222" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-style="italic"
    font-weight="700"
    fill="url(#fadeGrad)"
    letter-spacing="-1">Became</text>

  <!-- Dissolving particle dots trailing off "Became" -->
  <circle cx="445" cy="58" r="2.5" fill="#C9923A" opacity="0.25"/>
  <circle cx="453" cy="52" r="1.8" fill="#C9923A" opacity="0.15"/>
  <circle cx="449" cy="65" r="1.4" fill="#C9923A" opacity="0.12"/>
  <circle cx="460" cy="60" r="1.0" fill="#C9923A" opacity="0.08"/>
  <circle cx="456" cy="70" r="0.8" fill="#C9923A" opacity="0.06"/>
  <circle cx="465" cy="55" r="0.6" fill="#C9923A" opacity="0.05"/>

  <!-- Tagline -->
  <text x="32" y="96"
    font-family="Georgia, serif"
    font-size="11"
    fill="#7A6E60"
    letter-spacing="4"
    font-style="normal">A MUSEUM OF ABANDONED SELVES</text>

  <!-- Thin ornamental rule below -->
  <line x1="32" y1="106" x2="160" y2="106" stroke="#2E2820" stroke-width="0.5"/>
</svg>
