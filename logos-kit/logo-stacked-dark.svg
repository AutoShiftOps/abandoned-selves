<svg viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg" width="220" height="240">
  <rect width="220" height="240" fill="#0A0906"/>

  <!-- Icon centered, large -->
  <!-- Center: (110, 100), radius: 52 -->
  <!-- Start: 220° → (110 + 52*sin220, 100 - 52*cos220) = (110-33.4, 100+39.8) = (76.6, 139.8) -->
  <!-- End:   140° → (110 + 52*sin140, 100 - 52*cos140) = (110+33.4, 139.8) = (143.4, 139.8) -->
  <path d="M 76.6,139.8 A 52,52 0 1 1 143.4,139.8"
    stroke="#C9923A" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  <circle cx="76.6" cy="139.8" r="5.5" fill="#C9923A"/>
  <circle cx="143.4" cy="139.8" r="5.5" fill="#C9923A"/>
  <circle cx="110" cy="48" r="3" fill="#8A6128" opacity="0.7"/>

  <!-- Divider under icon -->
  <line x1="60" y1="164" x2="160" y2="164" stroke="#2E2820" stroke-width="1"/>

  <!-- "almost" - centered, italic, muted -->
  <text x="110" y="193"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="17" font-weight="400" font-style="italic"
    fill="#7A6E60" letter-spacing="5" text-anchor="middle">almost</text>

  <!-- "became" - centered, bold, cream -->
  <text x="110" y="222"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="24" font-weight="700"
    fill="#E8DCC8" letter-spacing="2" text-anchor="middle">became</text>
</svg>
